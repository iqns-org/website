<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 68" width="196" height="68" role="img" aria-label="IQNS.org">
  <defs>
    <linearGradient id="q" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#804080"/>
      <stop offset="100%" stop-color="#a080a0"/>
    </linearGradient>
  </defs>

  <!--  IQ:NS — heavy wordmark, horizontal gradient  -->
  <text
    x="0" y="38"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="40"
    font-weight="800"
    letter-spacing="-1.5"
